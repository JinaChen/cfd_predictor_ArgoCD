apiVersion: apps/v1
kind: Deployment
metadata:
  name: cfd-predictor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cfd-predictor
  template:
    metadata:
      labels:
        app: cfd-predictor
    spec:
      containers:
        - name: cfd-predictor
          image: cfd-predictor:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
